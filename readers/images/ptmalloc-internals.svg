<svg width="680" height="588" viewBox="0 0 680 588" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── block structure ── -->
<text x="44" y="16" font-size="12" fill="#5F5E5A" dominant-baseline="central">структура блока в памяти</text>

<!-- outer bg -->
<rect x="44" y="26" width="592" height="44" rx="4" fill="#F8F8F6" stroke="#D3D1C7" stroke-width="1"/>
<!-- header section (teal) -->
<rect x="45" y="27" width="111" height="42" fill="#E1F5EE"/>
<text x="100" y="48" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">size │ flags</text>
<!-- divider -->
<line x1="156" y1="26" x2="156" y2="70" stroke="#D3D1C7" stroke-width="0.5"/>
<!-- data section text -->
<text x="395" y="48" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">данные пользователя</text>
<!-- outer border on top -->
<rect x="44" y="26" width="592" height="44" rx="4" fill="none" stroke="#B4B2A9" stroke-width="1"/>

<!-- annotations -->
<text x="100" y="84" font-size="12" fill="#888780" text-anchor="middle" dominant-baseline="central">← заголовок →</text>
<text x="158" y="84" font-size="12" fill="#888780" dominant-baseline="central">↑  malloc() возвращает указатель сюда</text>

<!-- divider -->
<line x1="44" y1="98" x2="636" y2="98" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- ── flow section ── -->
<text x="44" y="112" font-size="12" fill="#5F5E5A" dominant-baseline="central">путь поиска при malloc(size)</text>

<!-- tcache (teal) -->
<rect x="180" y="122" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="310" y="140" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">tcache</text>
<text x="310" y="160" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">thread-local, no lock</text>

<line x1="310" y1="180" x2="310" y2="194" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- fast bin (purple) -->
<rect x="180" y="196" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="310" y="214" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">fast bin</text>
<text x="310" y="234" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">singly linked, ≤ 64 байт</text>

<line x1="310" y1="254" x2="310" y2="268" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- unsorted bin (purple) -->
<rect x="180" y="270" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="310" y="288" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">unsorted bin</text>
<text x="310" y="308" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">recently freed chunks</text>

<line x1="310" y1="328" x2="310" y2="342" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- small / large bins (purple) -->
<rect x="180" y="344" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="310" y="362" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">small / large bins</text>
<text x="310" y="382" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">doubly linked, by size</text>

<line x1="310" y1="402" x2="310" y2="416" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- top chunk (amber) -->
<rect x="180" y="418" width="260" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="310" y="436" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">top chunk</text>
<text x="310" y="456" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">нетронутый остаток кучи</text>

<line x1="310" y1="476" x2="310" y2="490" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- sbrk / mmap (gray) -->
<rect x="180" y="492" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="310" y="510" font-size="14" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">sbrk / mmap</text>
<text x="310" y="530" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">syscall, последний шаг</text>

<!-- speed indicator -->
<text x="454" y="148" font-size="12" fill="#888780" dominant-baseline="central">быстро</text>
<text x="454" y="510" font-size="12" fill="#888780" dominant-baseline="central">медленно</text>
<line x1="448" y1="162" x2="448" y2="496" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="444" y1="162" x2="452" y2="162" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="444" y1="496" x2="452" y2="496" stroke="#B4B2A9" stroke-width="0.5"/>

</svg>
